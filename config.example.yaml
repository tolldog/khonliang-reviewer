# khonliang-reviewer config — copy to config.yaml and edit locally.
# config.yaml is git-ignored; machine-specific paths and tokens go here.

# SQLite database for usage records + model pricing table.
db_path: data/reviewer.db

# Bus URL this agent registers with.
bus_url: http://localhost:8787

# Default provider used when the rule table has no better match.
# Rule-table-driven selection lands in a later work unit; until then this
# value is what the placeholder skill falls back to.
default_provider: ollama
default_model: qwen2.5-coder:14b

# Per-backend default models. Preferred over the legacy single-string
# `default_model` above: each backend ships its own sensible default so
# a caller asking for `claude_cli` without a model gets `sonnet` rather
# than the qwen-shaped global default. Empty-string entries mean
# "unset at the selector layer" — selection falls through to the
# legacy `default_model` (only if the chosen backend matches
# `default_provider`) or finally to the empty-string sentinel that
# tells providers to apply their own default. The legacy
# `default_model` field above stays valid for backward compat;
# operators with existing configs keep working without changes.
default_models:
  claude_cli: sonnet
  codex_cli: ""        # codex_cli picks its own default
  gh_copilot: ""       # gh_copilot picks its own default
  ollama: qwen2.5-coder:14b

# Provider-specific configuration. Each provider is implemented in a later
# work unit; the keys below are placeholders documenting the eventual shape.
providers:
  ollama:
    base_url: http://localhost:11434/v1
  claude_cli:
    # `claude` binary must be on PATH and `CLAUDE_CODE_OAUTH_TOKEN` must be
    # provisioned per-machine via `claude setup-token`. See CLAUDE.md.
    binary: claude
